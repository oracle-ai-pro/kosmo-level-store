<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Штаб ЛМСХ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        /* Сюда вставь свой CSS (переменные :root, .nav-header и т.д.) */
        :root { --bg: #0f0f1a; --accent: #8a2be2; --text: #fff; --card-bg: #1a1a2e; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        
        /* Стили для Oracle 1.1 */
        #oracle-trigger { position: fixed; bottom: 20px; right: 20px; background: #000; color: #fff; padding: 12px 24px; border: 2px solid var(--accent); border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; z-index: 9999; }
        #oracle-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .oracle-content { background: var(--card-bg); width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; border: 1px solid var(--accent); }
    </style>
    <script src="settings.js" defer></script>
</head>
<body>
    <main id="content-area"></main>
</body>
</html>
