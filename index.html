<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmo Level Store | Tablet Edition</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --accent: #5d3fd3;
            --card-bg: #1a1a2e;
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* Навигация для Планшета/ПК */
        nav {
            display: flex;
            justify-content: space-between; /* Название слева, вкладки справа */
            align-items: center;
            padding: 20px 5%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent);
        }

        .menu { display: flex; gap: 25px; }
        .menu a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; }
        .menu a:hover { color: var(--accent); }

        /* Сетка паков */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }

        .pack-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .pack-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .pack-card img { width: 100%; border-radius: 10px; }

        /* Модальное окно */
        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            max-width: 600px; width: 90%; position: relative;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 30px; }
    </style>
</head>
<body>

<nav>
    <div class="logo" style="font-size: 1.5rem; font-weight: bold;">Kosmo Level Store 🔑)</div>
    <div class="menu">
        <a href="index.html">Главная</a>
        <a href="kosmogram.html">Kosmogram</a>
        <a href="helper.html">Помощник</a>
        <a href="about.html">О сайте</a>
    </div>
</nav>

<div class="grid">
    <div class="pack-card" onclick="openPack('abp')">
        <img src="https://via.placeholder.com/300x150" alt="ABP">
        <h3>A Better Place 1.3.6</h3>
    </div>
    
    <div class="pack-card" onclick="openPack('kl33')">
        <img src="https://via.placeholder.com/300x150" alt="KL 3.3">
        <h3>Kosmo Level 3.3</h3>
    </div>
</div>

<div id="modalOverlay" class="overlay" onclick="closePack()">
    <div class="modal" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closePack()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    function openPack(type) {
        const content = document.getElementById('modalContent');
        const overlay = document.getElementById('modalOverlay');
        
        if(type === 'abp') {
            content.innerHTML = `
                <h2>A Better Place 1.3.6</h2>
                <p>Тот самый легендарный пак. Обновлен сегодня.</p>
                <button style="padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer;">Скачать</button>
            `;
        } else if(type === 'kl33') {
            content.innerHTML = `
                <h2>Kosmo Level 3.3</h2>
                <p>Классическая версия уровней для твоего симулятора.</p>
                <button style="padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer;">Скачать</button>
            `;
        }
        overlay.style.display = 'flex';
    }

    function closePack() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>

</body>
</html>
