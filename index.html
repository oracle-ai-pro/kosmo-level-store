<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <script>
        // Немедленное применение тем ДО отрисовки страницы
        (function() {
            const theme = localStorage.getItem('lmsh_theme') || 'dark';
            const accent = localStorage.getItem('lmsh_accent') || 'purple';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('data-accent', accent);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Штаб ЛМСХ | Главная</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script src="settings.js"></script>
    <style>
        :root { --bg: #0f0f1a; --accent: #5d3fd3; --card-bg: #1a1a2e; --text: #ffffff; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .main-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Сетка */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .pack-card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .pack-card:hover { border-color: var(--accent); }
        
        .pack-img { height: 100px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0.5; }
        
        .download-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .download-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* Стили навигации (приходят из settings.js) */
        .nav-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .nav-logo { font-weight: bold; color: var(--accent); }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { color: white; text-decoration: none; display: flex; align-items: center; gap: 5px; opacity: 0.8; }
        .nav-links a.active { color: var(--accent); opacity: 1; }
    </style>
</head>
<body>

    <main class="main-container">
        <h1>Штаб ЛМСХ</h1>
        <p>Выбирай нужный пак для загрузки</p>
        <div class="grid" id="packs-grid"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('packs-grid');
            PACKS_DATA.forEach(pack => {
                const card = document.createElement('div');
                card.className = 'pack-card';
                const isLocked = pack.status === 'locked';
                const actionText = pack.category === 'lore' ? 'Читать' : 'Скачать';
                const actionIcon = pack.category === 'lore' ? 'menu_book' : 'download';
                
                card.innerHTML = `
                    <div class="pack-img">${pack.category.toUpperCase()}</div>
                    <h3>${pack.title}</h3>
                    <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px;">${pack.description || 'Версия: ' + (pack.version || '1.0')}</p>
                    <button class="download-btn" ${isLocked ? 'disabled' : ''}>
                        <span class="material-symbols-outlined">${actionIcon}</span>
                        ${isLocked ? 'Недоступно' : actionText}
                    </button>
                `;
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
