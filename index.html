<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmo Level Installer - Packs and Historys</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,1,0" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="image_1783243002378.jpeg">
    <link rel="apple-touch-icon" href="image_1783243002378.jpeg">
</head>
<body>

    <div id="loader">
        <p id="easter-egg">Паков и Историй нету, открой окно, может из-за нехватки воздуха они пропали...</p>
    </div>

    <div id="nav-placeholder"></div>

    <main class="content">
        <h1>Паки и Истории</h1>
        
        <div class="search-container">
            <div id="search-wrapper">
                <input type="text" id="search-input" placeholder="Поиск паков..." class="normal-input">
                <button id="mode-toggle" class="material-symbols-rounded">swap_horiz</button>
            </div>
        </div>

        <div id="content-area">
            </div>
    </main>

    <script>
        // 1. Логика загрузки данных и скрытия пасхалки
        window.addEventListener('load', async () => {
            try {
                // Искусственная задержка 1.5 сек, чтобы рассмотреть пасхалку
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Файл не найден');
                const data = await response.json();
                
                // Плавное скрытие лоадера
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                
                console.log("Данные загружены, воздух в штабе в норме.");
                renderPacks(data.packs);
            } catch (e) {
                document.getElementById('easter-egg').innerText = "Ошибка загрузки: Окно закрыто, воздух не поступает.";
            }
        });

        // 2. Динамическая подгрузка навигации из nav.html
        fetch('nav.html')
            .then(res => {
                if(!res.ok) throw new Error();
                return res.text();
            })
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            })
            .catch(() => console.error("Не удалось загрузить навигационную панель."));

        // 3. Логика переключения поиска и перенаправления
const input = document.getElementById('search-input');
const toggle = document.getElementById('mode-toggle');

// Функция для отправки текста на страницу Помощника
function redirectToAssistant() {
    const query = input.value.trim();
    if (query) {
        // Сохраняем запрос в локальное хранилище браузера
        localStorage.setItem('assistant_query', query);
        // Перенаправляем на страницу помощника
        window.location.href = 'assistant.html';
    } else {
        input.placeholder = "Введите вопрос перед отправкой...";
    }
}

toggle.onclick = () => {
    if (input.classList.contains('ai-input')) {
        if (input.value.trim() !== '') {
            redirectToAssistant();
        } else {
            // Если пусто — сдуваем поле обратно
            input.classList.remove('ai-input');
            input.classList.add('normal-input');
            input.placeholder = "Поиск паков...";
            toggle.innerText = "swap_horiz"; // Возвращаем иконку стрелочек
        }
    } else {
        input.classList.remove('normal-input');
        input.classList.add('ai-input');
        input.placeholder = "Core Node 2.5: Задайте вопрос...";
        toggle.innerText = "send";
    }
};


// Слушаем нажатие Enter в поле ввода
input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (input.classList.contains('ai-input')) {
            redirectToAssistant();
        } else {
            // Обычный поиск по пакам (можно дописать позже)
            console.log("Обычный поиск по пакам:", input.value);
        }
    }
});


        // Функция рендера паков (простой пример отображения)
        function renderPacks(packs) {
            const area = document.getElementById('content-area');
            if(!packs || packs.length === 0) {
                area.innerHTML = "<p>Паков пока нет.</p>";
                return;
            }
            area.innerHTML = packs.map(pack => `
                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1)">
                    <h3>${pack.name} (v${pack.version})</h3>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
