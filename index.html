<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmo Level Store | Главная 🔑)</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script src="settings.js"></script>
    <style>
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding-bottom: 50px;
            transition: background 0.3s, color 0.3s;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        /* (Твои стили из начала переписки + добавь эти для сетки) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }
        .pack-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .pack-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .pack-img { height: 120px; background: #151525; border-radius: 16px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0.5; }
    </style>
</head>
<body>

    <main class="main-container">
        <h1>Штаб ЛМСХ</h1>
        <p class="subtitle">Выбирай нужный пак для загрузки</p>

        <div class="grid" id="packs-grid"></div>
    </main>

    <script>
        // Ждем загрузки, чтобы PACKS_DATA точно подгрузился из settings.js
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('packs-grid');
            
            PACKS_DATA.forEach(pack => {
                const card = document.createElement('div');
                card.className = 'pack-card';
                card.onclick = () => alert('Скачивание: ' + pack.title);
                
                card.innerHTML = `
                    <div class="pack-img">${pack.category.toUpperCase()}</div>
                    <h3>${pack.title}</h3>
                    <p style="font-size: 0.8rem; opacity: 0.7;">${pack.description || 'Версия: ' + (pack.version || '1.0')}</p>
                `;
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
