<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Штаб ЛМСХ | Главная</title>
    <script src="settings.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script src="settings.js"></script>

    <style>
        /* 2. ЕДИНЫЕ ПЕРЕМЕННЫЕ (Цвета теперь тут) */
        :root {
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --text: #ffffff;
            --accent: #5d3fd3;
            --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg: #fef7ff;
            --text: #1d1b20;
            --card-bg: #f3edf7;
            --border: rgba(0,0,0,0.1);
        }
        [data-accent="purple"] { --accent: #d0bcff; }
        [data-accent="blue"] { --accent: #a8c7fa; }
        [data-accent="green"] { --accent: #6ad1a3; }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; transition: background 0.3s, color 0.3s; }
        .main-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Сетка и карточки */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .pack-card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
        .pack-img { height: 100px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0.5; }
        
        .download-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        .download-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <main class="main-container">
        <h1>Штаб ЛМСХ</h1>
        <p>Выбирай нужный пак для загрузки</p>
        <div class="grid" id="packs-grid"></div>
    </main>

    <script>
        // Рендер карточек после загрузки
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('packs-grid');
            if (typeof PACKS_DATA !== 'undefined') {
                PACKS_DATA.forEach(pack => {
                    const card = document.createElement('div');
                    card.className = 'pack-card';
                    const isLocked = pack.status === 'locked';
                    const actionText = pack.category === 'lore' ? 'Читать' : 'Скачать';
                    const actionIcon = pack.category === 'lore' ? 'menu_book' : 'download';
                    
                    card.innerHTML = `
                        <div class="pack-img">${pack.category.toUpperCase()}</div>
                        <h3>${pack.title}</h3>
                        <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 15px;">${pack.description || 'Версия: ' + (pack.version || '1.0')}</p>
                        <button class="download-btn" ${isLocked ? 'disabled' : ''}>
                            <span class="material-symbols-outlined">${actionIcon}</span>
                            ${isLocked ? 'Недоступно' : actionText}
                        </button>
                    `;
                    grid.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
