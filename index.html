<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp&display=swap" />
    <style>
        /* СТИЛИ ПАКОВ (твои старые стили карточек) */
        :root { --bg: #0f0f1a; --card-bg: #1a1a2e; --accent: #8a2be2; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        /* Стили навигации и Оракула добавлены динамически через JS */
    </style>
    <script src="settings.js" defer></script>
</head>
<body>
    <main id="packs-grid" class="grid"></main>
</body>
</html>
