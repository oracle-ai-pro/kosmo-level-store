<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О сайте & Настройки — ЛМСХ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <script src="theme.js"></script>
    <script src="nav.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('about-tab')"><span class="material-symbols-outlined">info</span>О проекте</button>
            <button class="tab-btn" onclick="switchTab('settings-tab')"><span class="material-symbols-outlined">settings</span>Конфигурация</button>
        </div>

        <div id="about-tab" class="tab-content active">
            <div class="card">
                <h2><span class="material-symbols-outlined">groups</span>Штаб Управления ЛМСХ</h2>
                <p>Центральный узел Штаба. Здесь координируются все системы.</p>
            </div>
        </div>

        <div id="settings-tab" class="tab-content">
            <div class="card">
                <h2><span class="material-symbols-outlined">palette</span>Интерфейс</h2>
                <div class="setting-row">
                    <span>Режим отображения</span>
                    <select id="theme-select" onchange="updateTheme()">
                        <option value="dark">Тёмная</option>
                        <option value="light">Светлая</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="footer-credits">Core Node v2.3 | Powered by ЛМСХ &copy; 2026</div>
    </main>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
