<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О сайте & Настройки — ЛМСХ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <script src="theme.js"></script>
    <script src="nav.js" defer></script>
    
    <style>
        /* Стили только для контента страницы */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background, #141218);
            color: var(--md-sys-color-on-background, #e6e1e5);
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 80px;
        }

        .main-container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .tabs-container {
            display: flex;
            border-bottom: 1px solid var(--md-sys-color-outline, #938f99);
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 16px;
            color: var(--md-sys-color-on-surface-variant, #cac4d0);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            position: relative;
            transition: 0.2s;
        }
        .tab-btn.active { color: var(--md-sys-color-primary, #d0bcff); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 3px;
            background-color: var(--md-sys-color-primary, #d0bcff);
            border-radius: 3px 3px 0 0;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background-color: var(--md-sys-color-surface, #211f26);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        h2 { margin-top: 0; color: var(--md-sys-color-primary, #d0bcff); display: flex; align-items: center; gap: 10px; }

        .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        select { background-color: var(--md-sys-color-surface-variant, #49454f); color: var(--md-sys-color-on-background); padding: 8px; border-radius: 8px; border: 1px solid var(--md-sys-color-outline); }
        
        .footer-credits { text-align: center; font-size: 13px; color: var(--md-sys-color-on-surface-variant); margin-top: 32px; }
    </style>
</head>
<body>

    <main class="main-container">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('about-tab')"><span class="material-symbols-outlined">info</span>О проекте</button>
            <button class="tab-btn" onclick="switchTab('settings-tab')"><span class="material-symbols-outlined">settings</span>Конфигурация</button>
        </div>

        <div id="about-tab" class="tab-content active">
            <div class="card">
                <h2><span class="material-symbols-outlined">groups</span>Штаб Управления ЛМСХ</h2>
                <p>Центральный узел Штаба. Здесь координируются все системы.</p>
            </div>
        </div>

        <div id="settings-tab" class="tab-content">
            <div class="card">
                <h2><span class="material-symbols-outlined">palette</span>Интерфейс</h2>
                <div class="setting-row">
                    <span>Режим отображения</span>
                    <select id="theme-select" onchange="updateTheme()">
                        <option value="dark">Тёмная</option>
                        <option value="light">Светлая</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="footer-credits">Core Node v2.3 | Powered by ЛМСХ &copy; 2026</div>
    </main>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
