<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kosmo Level Store | Помощник 🔑)</title>
    <style>
        :root {
            --bg: #010103;
            --card: rgba(10, 10, 15, 0.6);
            --cyan: #02b6ed;
            --purple: #e60ced;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --grad: linear-gradient(90deg, #02b6ed 0%, #e60ced 100%);
            /* Titan Vars */
            --accent: #00f2ff;
            --input: #1c1c1e;
            --shadow: rgba(0, 242, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            background: radial-gradient(circle at top left, rgba(2, 182, 237, 0.03), transparent), radial-gradient(circle at bottom right, rgba(230, 12, 237, 0.03), transparent);
        }

        /* --- НАВИГАЦИЯ (ТОЧНАЯ КОПИЯ С ГЛАВНОЙ) --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background: #010103;
            height: 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-nav {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--cyan);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .menu-nav {
            display: flex;
            gap: 20px;
        }

        .menu-nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: 0.3s;
            font-weight: 400;
        }

        .menu-nav a:hover, .menu-nav a.active {
            opacity: 1;
            color: var(--cyan);
        }

        /* --- БУРГЕР МЕНЮ --- */
        .burger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 10001;
        }

        .burger span {
            width: 22px;
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* --- КОНТЕЙНЕР ОРАКУЛА --- */
        .main-wrapper { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }

        .oracle-container { 
            width: 100%; 
            max-width: 450px; 
            height: 75vh; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .top-nav-btn { position: absolute; top: 20px; right: 25px; z-index: 100; }
        
        .toggle-mode-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border); 
            color: var(--cyan); 
            padding: 8px 14px; 
            border-radius: 14px; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.2s;
        }
        .toggle-mode-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--cyan); }

        .header { padding: 25px 20px 15px; text-align: left; padding-left: 30px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; font-size: 18px; letter-spacing: 2px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

        /* РЕЖИМЫ И КОНТЕНТ */
        .mode-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 25px; }
        .hidden { display: none !important; }

        /* КОНТЕНТ: ПАКИ */
        .section-title { font-size: 11px; font-weight: 900; color: var(--cyan); text-transform: uppercase; margin: 0 0 15px; border-left: 3px solid var(--purple); padding-left: 10px; letter-spacing: 1px; }
        .packs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .item-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
        .download-btn { display: block; padding: 10px; background: #fff; color: #000; text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 11px; text-align: center; transition: 0.2s; }
        .download-btn:active { transform: scale(0.96); }

        /* КОНТЕНТ: ЧАТ ОРАКУЛА */
        #chat-flow { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; overflow-y: auto; padding-right: 5px; }
        .msg { padding: 12px 16px; border-radius: 20px; font-size: 14px; max-width: 85%; line-height: 1.45; }
        .ai-msg { background: rgba(255, 255, 255, 0.04); align-self: flex-start; border: 1px solid var(--border); border-top-left-radius: 5px; }
        .user-msg { background: var(--grad); align-self: flex-end; border-top-right-radius: 5px; }
        
        .input-box { display: flex; gap: 10px; background: rgba(255,255,255,0.04); padding: 8px 8px 8px 16px; border-radius: 20px; border: 1px solid var(--border); align-items: center; }
        .input-box input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 14px; }
        .send-btn { background: var(--cyan); border: none; border-radius: 50%; width: 32px; height: 32px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        /* КОНТЕНТ: TITAN */
        .titan-inner { text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .btn-titan { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; margin-top: 12px; font-size: 14px; transition: 0.2s; }
        .btn-titan:active { transform: scale(0.97); }
        
        .loader-lmsh { display: flex; justify-content: center; gap: 12px; margin: 30px 0; font-size: 36px; font-weight: 900; color: var(--accent); }
        @keyframes jump { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); text-shadow: 0 10px 20px var(--accent); } }
        .loader-lmsh span { display: inline-block; animation: jump 0.6s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .loader-lmsh span:nth-child(2) { animation-delay: 0.1s; }
        .loader-lmsh span:nth-child(3) { animation-delay: 0.2s; }
        .loader-lmsh span:nth-child(4) { animation-delay: 0.3s; }

        /* АДАПТИВНОСТЬ ДЛЯ МЕНЮ */
        @media (max-width: 768px) {
            .burger { display: flex; }
            .menu-nav {
                display: none; 
                flex-direction: column;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100vh;
                background: var(--bg);
                justify-content: center;
                align-items: center;
                gap: 35px;
                z-index: 10000;
            }
            .menu-nav.active { display: flex; }
            .menu-nav a { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo-nav">Kosmo Level Store 🔑)</a>
    <div class="burger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="menu-nav" id="navMenu">
        <a href="index.html">Главная</a>
        <a href="kosmogram.html">Kosmogram</a>
        <a href="helper.html" class="active">Помощник</a>
        <a href="about.html">О сайте</a>
    </div>
</nav>

<div class="main-wrapper">
    <div class="oracle-container">
        <div class="top-nav-btn"><button class="toggle-mode-btn" onclick="rotateMode()" id="mode-label">Режим: Паки</button></div>
        <div class="header"><div class="logo">Oracle AI 1.1</div></div>
        
        <div id="mode-chat" class="mode-content hidden">
            <div id="chat-flow">
                <div class="msg ai-msg">Оракул активен. Снежинка и Хахми в системе. Какую версию ищем? 🔑)</div>
            </div>
            <div class="input-box">
                <input type="text" id="user-in" placeholder="Спроси про 3.3..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">➔</button>
            </div>
        </div>

        <div id="mode-packs" class="mode-content">
            <div class="section-title">Архивные паки</div>
            <div class="packs-grid" id="packs-list"></div>
            <div class="section-title">История штаба</div>
            <div class="item-card" style="flex-direction: row; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px; opacity: 0.8;">Вторжение Люми</span>
                <a href="#" class="download-btn" style="margin: 0; padding: 6px 15px;">Читать</a>
            </div>
        </div>

        <div id="mode-titan" class="mode-content hidden">
            <div class="titan-inner">
                <div class="section-title" style="border-left-color: var(--accent); color: var(--accent); margin-bottom: 5px;">LMSH TITAN</div>
                <div id="titan-main-ui">
                    <p style="font-size: 13px; opacity: 0.6; margin-bottom: 25px;">Зашифрованный канал связи со Штабом</p>
                    <button class="btn-titan" onclick="startTitanLoad()">ОТПРАВИТЬ ЗАПРОС</button>
                    <button class="btn-titan" style="background:rgba(255,255,255,0.05); color:var(--accent); border: 1px solid rgba(0,242,255,0.2);" onclick="alert('Архив Штаба пуст.')">🔍 АРХИВ</button>
                </div>
                <div id="titan-loader" class="hidden">
                    <div class="loader-lmsh"><span>Л</span><span>М</span><span>С</span><span>Х</span></div>
                    <p style="font-size: 11px; opacity: 0.5; letter-spacing: 1px;">УСТАНОВКА СОЕДИНЕНИЯ...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const versions = ["1.0", "2.0", "2.2", "2.5", "2.8", "3.0", "3.1"];
    let currentMode = 1; // Начинаем с режима Паки (как на скриншоте)

    function toggleMenu() {
        if (window.innerWidth <= 768) {
            document.getElementById('navMenu').classList.toggle('active');
        }
    }

    function rotateMode() {
        currentMode = (currentMode + 1) % 3;
        const modes = ['mode-chat', 'mode-packs', 'mode-titan'];
        const labels = ['Режим: Паки', 'Режим: Titan', 'Режим: Оракул'];
        
        modes.forEach((m, i) => document.getElementById(m).classList.toggle('hidden', i !== currentMode));
        document.getElementById('mode-label').innerText = labels[currentMode];
    }

    function renderPacks() {
        const list = document.getElementById('packs-list');
        list.innerHTML = "";
        versions.forEach(v => {
            list.innerHTML += `
                <div class="item-card">
                    <div class="item-name">KL ${v}</div>
                    <a href="#" class="download-btn">Скачать</a>
                </div>`;
        });
    }

    function startTitanLoad() {
        document.getElementById('titan-main-ui').classList.add('hidden');
        document.getElementById('titan-loader').classList.remove('hidden');
        setTimeout(() => {
            alert("Канал TITAN: Соединение установлено. Ошибка авторизации PIN-кода.");
            document.getElementById('titan-main-ui').classList.remove('hidden');
            document.getElementById('titan-loader').classList.add('hidden');
        }, 2500);
    }

    function send() {
        const inp = document.getElementById('user-in');
        const val = inp.value.trim(); if(!val) return;
        const chat = document.getElementById('chat-flow');
        
        chat.innerHTML += `<div class="msg user-msg">${val}</div>`;
        chat.scrollTop = chat.scrollHeight;
        
        setTimeout(() => {
            let resp = "Запрос отправлен Главному инженеру Ламирку.";
            if(val.toLowerCase().includes("басс") || val.toLowerCase().includes("трек")) {
                resp = "Я попробую передать Снежинке, но Мурзик против. АХАХАХАХА! 🔑)";
            }
            chat.innerHTML += `<div class="msg ai-msg">${resp}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 600);
        inp.value = "";
    }

    renderPacks();
</script>
</body>
</html>
