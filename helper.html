<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Оракул — Штаб ЛМСХ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="theme.js"></script>
    <script src="nav.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-box">
            <div class="status-indicator">
                <div id="dot-idle" class="dot idle active"></div>
                <div id="dot-active" class="dot active"></div>
            </div>
            <div id="chat-log" class="chat-log">
                <div class="msg">Оракул: Система развернута на полный экран. Ожидаю команды, Инженер.</div>
            </div>
            <input type="text" id="user-input" placeholder="Введите код команды..." onkeydown="if(event.key === 'Enter') sendMessage()">
        </div>
    </div>

    <script>
        const chatLog = document.getElementById('chat-log');
        const input = document.getElementById('user-input');

        const COMMANDS = {
            "привет": "Приветствую, Инженер. Соединение с ядром стабильно.",
            "авп": "A Better Place 1.3.6: Все пакеты верифицированы.",
            "космограм": "Доступ к архиву открыт. [Ссылка на Kosmogram]",
            "лмш": "Июнь 2026: Статус 'Подготовка к релизу 2.0'.",
            "вокал": "Снежинка и Хахми готовы к записи. Жду сигнала."
        };

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            
            chatLog.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chatLog.scrollTop = chatLog.scrollHeight;
            
            document.getElementById('dot-idle').classList.remove('active');
            document.getElementById('dot-active').classList.add('active');

            setTimeout(() => {
                let response = COMMANDS[text.toLowerCase()] || "Ошибка 404: Команда не распознана в протоколах Штаба.";
                chatLog.innerHTML += `<div class="msg">Оракул: ${response}</div>`;
                chatLog.scrollTop = chatLog.scrollHeight;
                
                document.getElementById('dot-idle').classList.add('active');
                document.getElementById('dot-active').classList.remove('active');
            }, 800);
        }
    </script>
</body>
</html>
