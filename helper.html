<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oracle AI 1.1 | Prestige HQ</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #02b6ed;
            --purple: #e60ced;
            --text: #ffffff;
            --input: #2c2c2e;
            --danger: #ff453a;
            --shadow: rgba(2, 182, 237, 0.3);
            --grad: linear-gradient(90deg, #02b6ed 0%, #e60ced 100%);
        }

        .light-theme { --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; --text: #000000; --input: #e5e5ea; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* НАВИГАЦИЯ (КАК НА ГЛАВНОЙ) */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #000000; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-nav { font-size: 1.1rem; font-weight: bold; color: #ffffff; text-decoration: none; }
        .menu-nav { display: flex; gap: 20px; }
        .menu-nav a { color: #ffffff; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .menu-nav a:hover { opacity: 1; }

        .main-content { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }

        /* КОНТЕЙНЕР ОРАКУЛА */
        .oracle-container { 
            width: 95%; max-width: 450px; height: 80vh; background: rgba(10, 10, 15, 0.85); 
            backdrop-filter: blur(25px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            box-shadow: 0 15px 50px -10px var(--shadow);
        }

        .top-btn-area { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .mode-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--accent); padding: 8px 12px; border-radius: 12px; font-size: 10px; font-weight: 900; cursor: pointer; }

        /* ЭЛЕМЕНТЫ ЧАТА */
        #chat-mode, #packs-mode { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 18px; border-radius: 20px; font-size: 14px; max-width: 85%; line-height: 1.4; position: relative; }
        .ai-msg { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border: 1px solid rgba(255,255,255,0.1); }
        .user-msg { background: var(--grad); align-self: flex-end; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.2); }
        .input-box input { flex: 1; background: var(--input); border: none; border-radius: 15px; padding: 12px; color: white; outline: none; }
        .send-btn { background: var(--grad); border: none; border-radius: 15px; width: 45px; color: white; cursor: pointer; }

        /* ВСТРОЕННЫЙ TITAN */
        #titan-screen { position: absolute; inset: 0; background: var(--bg); z-index: 50; display: none; overflow-y: auto; padding: 20px; }
        .titan-card { background: var(--card); border-radius: 30px; padding: 25px; text-align: center; box-shadow: 0 10px 30px var(--shadow); }
        .btn-titan { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--accent); color: #fff; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* ПАКИ */
        #packs-mode { display: none; padding: 20px; overflow-y: auto; }
        .packs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pack-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 18px; text-align: center; }
        .pack-name { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .dl-btn { display: block; background: #fff; color: #000; text-decoration: none; padding: 6px; border-radius: 8px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="dark-theme">

<nav>
    <a href="index.html" class="logo-nav">LMSH ULTRA 🔑)</a>
    <div class="menu-nav">
        <a href="index.html">В Магазин</a>
        <a href="kosmogram.html">Kosmogram</a>
    </div>
</nav>

<div class="main-content">
    <div class="oracle-container">
        <div class="top-btn-area">
            <button class="mode-btn" onclick="rotateMode()" id="mode-label">РЕЖИМ: ПАКИ</button>
        </div>

        <div class="header" style="text-align:center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div style="font-weight:900; font-size:16px; letter-spacing:2px; color:var(--accent);">ORACLE AI 1.1</div>
        </div>

        <div id="chat-mode">
            <div id="chat-flow">
                <div class="msg ai-msg">Оракул активен. Снежинка и Хахми в системе. Какую версию ищем?</div>
            </div>
            <div class="input-box">
                <input type="text" id="user-in" placeholder="Спроси про 3.3..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">➔</button>
            </div>
        </div>

        <div id="packs-mode">
            <div style="font-size:11px; color:var(--accent); font-weight:900; margin-bottom:10px;">АРХИВ ПАКОВ</div>
            <div class="packs-grid" id="packs-list"></div>
            <div style="margin-top:20px; font-size:11px; color:var(--purple); font-weight:900;">ПОМОЩЬ И СПРАВКА</div>
            <div class="pack-card" style="margin-top:10px; text-align:left;">
                <p style="font-size:10px; opacity:0.7;">Используй Оракул для поиска версий. События 21 августа доступны по запросу "Люми".</p>
            </div>
        </div>

        <div id="titan-screen">
            <div class="titan-card">
                <h2 id="titan-title">TITAN SYSTEM</h2>
                <div id="timer" style="font-size:40px; margin:20px 0; color:var(--accent); font-weight:800;">01:00</div>
                <button class="btn-titan" onclick="startSystem()">АКТИВИРОВАТЬ</button>
                <button class="btn-titan" style="background:none; color:var(--accent);" onclick="alert('Архив временно недоступен')">🔍 АРХИВ</button>
            </div>
            </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8YweWa9ZP1nQKbrgvZvPiwVa2DLlaRgM-03xRFUJ5SSTv1WiSXpE9S6mG3aMtZhRahw/exec";
    const versions = ["1.0", "2.0", "2.2", "2.5", "2.8", "2.9", "3.0", "3.1", "3.2", "3.3"];
    let mode = 0; // 0-Chat, 1-Packs, 2-Titan

    function rotateMode() {
        mode = (mode + 1) % 3;
        document.getElementById('chat-mode').style.display = (mode === 0) ? 'flex' : 'none';
        document.getElementById('packs-mode').style.display = (mode === 1) ? 'block' : 'none';
        document.getElementById('titan-screen').style.display = (mode === 2) ? 'block' : 'none';
        
        const labels = ["РЕЖИМ: ПАКИ", "РЕЖИМ: TITAN", "РЕЖИМ: ОРАКУЛ"];
        document.getElementById('mode-label').innerText = labels[mode];
        if(mode === 1) renderPacks();
    }

    function renderPacks() {
        const list = document.getElementById('packs-list');
        list.innerHTML = "";
        versions.forEach(v => {
            list.innerHTML += `<div class="pack-card"><div class="pack-name">KL ${v}</div><a href="packs/Kosmo_Level_${v}.worldpack" class="dl-btn" download>Скачать</a></div>`;
        });
    }

    function send() {
        const inp = document.getElementById('user-in');
        const val = inp.value.trim(); if(!val) return;
        addMsg(val, 'user-msg');
        inp.value = "";
        
        setTimeout(() => {
            const low = val.toLowerCase();
            if(low.includes("басс")) {
                addMsg("Я попробую создать трек, правда не на моей модели... А, нет, мне не разрешили. АХАХАХАХА!", "ai-msg");
            } else if(versions.includes(val)) {
                addMsg(`Билд ${val} найден. Ссылка доступна во вкладке ПАКИ.`, "ai-msg");
            } else {
                addMsg("Запрос принят штабом ЛМСХ.", "ai-msg");
            }
        }, 500);
    }

    function addMsg(text, type) {
        const chat = document.getElementById('chat-flow');
        const d = document.createElement('div'); d.className = 'msg ' + type;
        d.innerText = text;
        chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
    }

    // ТИТАН ЛОГИКА
    function startSystem() {
        let t = 60;
        const timerDiv = document.getElementById('timer');
        const interval = setInterval(() => {
            t--;
            timerDiv.innerText = `00:${t < 10 ? '0'+t : t}`;
            if(t <= 0) { clearInterval(interval); alert("Шлюз открыт!"); timerDiv.innerText = "01:00"; }
        }, 20);
    }
</script>
</body>
</html>
