<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оракул Помощник | Штаб ЛМСХ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script src="settings.js"></script>

    <style>
        :root {
            /* Базовые цвета для Темной темы */
            --bg: #0a0a12;
            --accent: #02b6ed;
            --card-bg: rgba(26, 26, 46, 0.6);
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            
            --md-sys-color-surface: #1a1a2e;
            --md-sys-color-surface-variant: rgba(255, 255, 255, 0.08);
            --md-sys-color-primary: #02b6ed;
        }

        /* Автоматическая перекраска под Светлую тему */
        [data-theme="light"] {
            --bg: #fef7ff;
            --text: #1d1b20;
            --card-bg: #f3edf7;
            --border: rgba(0, 0, 0, 0.1);
            --md-sys-color-surface: #f3edf7;
            --md-sys-color-surface-variant: rgba(0, 0, 0, 0.05);
        }

        /* Динамические цветовые акценты из Настроек */
        [data-accent="purple"] { --accent: #d0bcff; --md-sys-color-primary: #d0bcff; }
        [data-accent="blue"] { --accent: #a8c7fa; --md-sys-color-primary: #a8c7fa; }
        [data-accent="green"] { --accent: #6ad1a3; --md-sys-color-primary: #6ad1a3; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 40px;
        }

        /* --- СТИЛИ НАВИГАЦИИ ИЗ SETTINGS.JS --- */
        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg);
            padding: 10px 5%;
            height: 60px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            padding: 6px 12px;
            border-radius: 14px;
        }
        .nav-links a:hover, .nav-links a.active {
            opacity: 1;
            color: var(--accent);
            background-color: var(--card-bg);
        }

        /* --- ИНТЕРФЕЙС ОРАКУЛА --- */
        .oracle-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            flex-grow: 1;
        }

        .oracle-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .oracle-avatar {
            font-size: 3.5rem;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .oracle-welcome {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* Поле ввода вопроса */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .oracle-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .oracle-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(2, 182, 237, 0.2);
        }

        .oracle-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .oracle-btn:active { transform: scale(0.97); }

        /* Окно ответа */
        .answer-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            border-left: 4px solid var(--accent);
            text-align: left;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .answer-title { font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.6; }
        .answer-text { font-size: 1.05rem; line-height: 1.5; }

        /* --- ПАНЕЛЬ РАЗРАБОТЧИКА (СКРЫТАЯ) --- */
        .dev-panel {
            margin-top: 25px;
            background: #000;
            border: 1px solid #ff9f43;
            border-radius: 16px;
            padding: 15px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #ff9f43;
            display: none; /* Контролируется через LocalStorage */
        }
        .dev-title { font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }

        /* Адаптивность */
        @media (max-width: 768px) {
            .nav-header { height: auto; flex-direction: column; padding: 15px 2%; gap: 12px; }
            .nav-links { width: 100%; justify-content: center; flex-wrap: wrap; gap: 8px; }
            .nav-links a { font-size: 0.85rem; padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <main class="oracle-container">
        <div class="oracle-card">
            <div class="oracle-avatar">🔮</div>
            <h1>Система Хелпер-Оракул</h1>
            <div class="oracle-welcome" id="oracle-greeting">
                Инициализация подсистемы... Приветствую, Инженер. Что ты хочешь узнать у ядра ЛМСХ?
            </div>

            <div class="input-group">
                <input type="text" id="question-field" class="oracle-input" placeholder="Введите ваш запрос к базе данных Штаба..." onkeydown="if(event.key === 'Enter') askOracle()">
            </div>

            <button class="oracle-btn" onclick="askOracle()">Запросить Ядро</button>

            <div class="answer-box" id="answer-container">
                <div class="answer-title" id="answer-author">Ответ подсистемы</div>
                <div class="answer-text" id="answer-content">Привет! Я готов к обработке логов.</div>
            </div>
        </div>

        <div class="dev-panel" id="developer-logs">
            <div class="dev-title"><span class="material-symbols-outlined" style="font-size:18px;">terminal</span> Developer Mode Active</div>
            <div id="log-console">> Локальный буфер чист. Оракул запущен в режиме интеграции с ремиксами.</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Подтягиваем имя пользователя для персонализации приветствия
            const savedName = localStorage.getItem('lmsh_username') || 'Инженер';
            document.getElementById('oracle-greeting').innerHTML = `Приветствую, <b>${savedName}</b>. Я — Оракул Штаба ЛМСХ. Задай мне технический вопрос по Kosmo Level или управлению лентами.`;

            // Проверяем, включен ли режим разработчика в настройках
            const devMode = localStorage.getItem('lmsh_dev_mode') === 'true';
            if (devMode) {
                document.getElementById('developer-logs').style.display = 'block';
            }
        });

        // Простая и умная логика ответов Оракула
        function askOracle() {
            const query = document.getElementById('question-field').value.toLowerCase().trim();
            const answerBox = document.getElementById('answer-container');
            const answerContent = document.getElementById('answer-content');
            const answerAuthor = document.getElementById('answer-author');
            const consoleLog = document.getElementById('log-console');

            if (query === "") return;

            // Логирование действия в дев-панель
            if (consoleLog) {
                consoleLog.innerHTML += `<br>> Считан запрос: "${query}"`;
            }

            // Дефолтный ответ ядра Штаба ЛМСХ
            let reply = "Запрос отправлен в архив Штаба ЛМСХ. На данный момент у меня нет точной директивы на этот счет, но Главный инженер Ламирк добавит её в базу ядра LMSH 2.0 в Июне 2026 года!";
            let author = "Центральное Ядро ЛМСХ";

            // База знаний Хелпера-Оракула
            if (query.includes('привет') || query.includes('hello')) {
                reply = "Приветствую! Соединение со Штабом стабильно. Все системы кэширования работают в штатном режиме. Мурзик на страже!";
                author = "Мурзик 🐾";
            } else if (query.includes('авп') || query.includes('abp') || query.includes('better place')) {
                reply = "Пак уровней 'A Better Place 1.3.6' полностью готов к интеграции! Включает исправления багов сенсоров экрана на Android и новые шейдерные пресеты.";
                author = "Ламирк (Главный инженер) 🛠️";
            } else if (query.includes('космограм') || query.includes('kosmogram') || query.includes('бинго')) {
                reply = "В Космограме опубликован архивный ролик про Бинго. Полина, если ты видишь этот лог — вторая часть таблицы Бинго уже находится на этапе проектирования!";
                author = "Хахми 🎤";
            } else if (query.includes('lmsh') || query.includes('лмш') || query.includes('обновлен')) {
                reply = "Внимание! Развертывание глобальной экосистемы LMSH 2.0 назначено на Июнь 2026 года. Текущая сборка сайтов на GitHub Pages является стабильным мостом подготовки.";
                author = "Штаб ЛМСХ 🚀";
            } else if (query.includes('вокал') || query.includes('музык') || query.includes('песн')) {
                reply = "Модуляция аудиопотоков завершена. Снежинка и Хахми готовы к синхронизации частот вещания для новых саундтреков Kosmo Level.";
                author = "Снежинка ❄️";
            }

            // Выводим ответ на экран
            answerAuthor.innerText = `Ответ от: ${author}`;
            answerContent.innerText = reply;
            answerBox.style.display = 'block';
        }
    </script>
</body>
</html>
