<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровые Ивенты - Kosmo Level Installer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,1,0" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="image_1783243002378.jpeg">
    <link rel="apple-touch-icon" href="image_1783243002378.jpeg">
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="content">
        <h1>Игровые Ивенты</h1>
        <p style="opacity: 0.6; margin-bottom: 25px;">Следите за расписанием ивентов штаба ЛМСХ</p>
        
        <div id="events-area">
            <p>Загрузка систем мониторинга времени...</p>
        </div>
    </main>

    <script>
        // 1. Подгрузка общей навигации
        fetch('nav.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                // Запускаем проверку "маячка" после загрузки меню
                updateNavNotification();
            });

        // 2. Тестовые данные ивентов (в будущем можно перенести в data.json)
        const eventsData = [
            {
                name: "Глобальный Стрим Хахми",
                // Формат даты: ГГГГ-ММ-ДДTHH:ММ:СС (Установи время, когда должен начаться ивент)
                targetDate: "2026-08-15T18:00:00", 
                description: "Музыкальный ивент и разбор скрытых комнат пака 3.4 в прямом эфире."
            },
            {
                name: "Технический аудит Ламирка",
                targetDate: "2026-07-20T12:00:00",
                description: "Инженерный сброс кэша и обновление Core Node системы."
            }
        ];

        function renderEvents() {
            const area = document.getElementById('events-area');
            
            if (eventsData.length === 0) {
                area.innerHTML = "<p>Активных ивентов сейчас нет. Наслаждайтесь тишиной в штабе.</p>";
                return;
            }

            area.innerHTML = eventsData.map((event, index) => `
                <div class="event-card">
                    <div class="event-header">
                        <h3>${event.name}</h3>
                        <span class="status-badge" id="status-${index}">Ожидание</span>
                    </div>
                    <p class="event-desc">${event.description}</p>
                    <div class="countdown-container">
                        <div class="time-block"><span id="days-${index}">00</span><label>дн</label></div>
                        <div class="time-block"><span id="hours-${index}">00</span><label>ч</label></div>
                        <div class="time-block"><span id="mins-${index}">00</span><label>мин</label></div>
                        <div class="time-block"><span id="secs-${index}">00</span><label>сек</label></div>
                    </div>
                </div>
            `).join('');

            // Запуск таймеров
            eventsData.forEach((event, index) => {
                startCountdown(event.targetDate, index);
            });
        }

        function startCountdown(dateString, index) {
            const targetTime = new Date(dateString).getTime();

            const timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const difference = targetTime - now;

                if (difference <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById(`status-${index}`).innerText = "ИВЕНТ НАЧАЛСЯ!";
                    document.getElementById(`status-${index}`).classList.add('active-now');
                    return;
                }

                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById(`days-${index}`).innerText = String(days).padStart(2, '0');
                document.getElementById(`hours-${index}`).innerText = String(hours).padStart(2, '0');
                document.getElementById(`minutes-${index}`).innerText = String(minutes).padStart(2, '0'); // Фикс ID для минут (в шаблоне mins)
                // Исправим сразу обращение к элементам:
                const dEl = document.getElementById(`days-${index}`);
                const hEl = document.getElementById(`hours-${index}`);
                const mEl = document.getElementById(`mins-${index}`);
                const sEl = document.getElementById(`secs-${index}`);

                if(dEl) dEl.innerText = String(days).padStart(2, '0');
                if(hEl) hEl.innerText = String(hours).padStart(2, '0');
                if(mEl) mEl.innerText = String(minutes).padStart(2, '0');
                if(sEl) sEl.innerText = String(seconds).padStart(2, '0');

            }, 1000);
        }

        // Подсветка колокольчика в меню
        function updateNavNotification() {
            // Ищем вторую ссылку в навигации (Игровые Ивенты)
            const eventLink = document.querySelectorAll('.nav-item')[1];
            if (eventLink && eventsData.length > 0) {
                eventLink.style.position = 'relative';
                // Добавляем красный светящийся маркер уведомления
                const dot = document.createElement('div');
                dot.className = 'nav-badge-dot';
                eventLink.appendChild(dot);
            }
        }

        // Инициализация при загрузке страницы
        renderEvents();
    </script>
</body>
</html>
