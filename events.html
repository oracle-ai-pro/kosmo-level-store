<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровые Ивенты - Kosmo Level Installer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,1,0" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="image_1783243002378.jpeg">
    <link rel="apple-touch-icon" href="image_1783243002378.jpeg">
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="content">
        <h1>Игровые Ивенты</h1>
        
        <div class="test-notify-container">
            <button id="btn-test-auth" class="btn-neon">
                <span class="material-symbols-rounded">security_notification</span>
                Проверить систему уведомлений
            </button>
        </div>

        <p style="opacity: 0.6; margin-bottom: 25px;">Запланированные события штаба ЛМСХ:</p>
        
        <div id="events-area">
            </div>
    </main>

    <script>
        // 1. Подгрузка навигации
        fetch('nav.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });

        // Данные ивентов (Дату ставим в будущем времени)
        const eventsData = [
            {
                id: "stream-hahmi-2026",
                name: "Глобальный Стрим Хахми",
                targetDate: "2026-08-15T18:00:00", 
                description: "Музыкальный ивент и разбор скрытых комнат пака 3.4 в прямом эфире."
            },
            {
                id: "audit-lamirk-2026",
                name: "Технический аудит Ламирка",
                targetDate: "2026-07-20T12:00:00",
                description: "Инженерный сброс кэша и обновление Core Node системы."
            }
        ];

        // 2. Тестовое уведомление и запрос прав
        const testBtn = document.getElementById('btn-test-auth');
        testBtn.onclick = () => {
            if (!("Notification" in window)) {
                alert("Этот браузер не поддерживает уведомления.");
                return;
            }

            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    new Notification("Штаб ЛМСХ", {
                        body: "Система уведомлений успешно активирована! Воздух в норме.",
                        icon: "image_1783243002378.jpeg"
                    });
                } else {
                    alert("Доступ к уведомлениям заблокирован. Проверь настройки приложения или MIUI.");
                }
            });
        };

        // 3. Рендер ивентов
        function renderEvents() {
            const area = document.getElementById('events-area');
            area.innerHTML = eventsData.map((event, index) => {
                // Проверяем, подписан ли уже пользователь (сохраняем в localStorage)
                const isSubscribed = localStorage.getItem(`notify_${event.id}`) === 'true';
                
                return `
                    <div class="event-card">
                        <div class="event-header">
                            <h3>${event.name}</h3>
                        </div>
                        <p class="event-desc">${event.description}</p>
                        <button class="btn-action ${isSubscribed ? 'subscribed' : ''}" onclick="toggleSubscription('${event.id}', this)">
                            <span class="material-symbols-rounded">${isSubscribed ? 'notifications_active' : 'notifications'}</span>
                            <label>${isSubscribed ? 'Вы подписаны' : 'Получить уведомление'}</label>
                        </button>
                    </div>
                `;
            }).join('');
        }

        // 4. Логика подписки / отписки
        window.toggleSubscription = (eventId, button) => {
            if (Notification.permission !== "granted") {
                alert("Сначала нажми кнопку проверки вверху экрана и разреши уведомления!");
                return;
            }

            const isSubscribed = localStorage.getItem(`notify_${eventId}`) === 'true';
            const icon = button.querySelector('.material-symbols-rounded');
            const label = button.querySelector('label');

            if (isSubscribed) {
                localStorage.removeItem(`notify_${eventId}`);
                button.classList.remove('subscribed');
                icon.innerText = 'notifications';
                label.innerText = 'Получить уведомление';
            } else {
                localStorage.setItem(`notify_${eventId}`, 'true');
                button.classList.add('subscribed');
                icon.innerText = 'notifications_active';
                label.innerText = 'Вы подписаны';
                
                // Имитация: Запуск таймера для проверки (сработает, если дата наступила)
                checkEventTime(eventId);
            }
        };

        // Функция симуляции фоновой проверки времени (для теста)
        function checkEventTime(eventId) {
            const currentEvent = eventsData.find(e => e.id === eventId);
            if (!currentEvent) return;

            const checkInterval = setInterval(() => {
                const now = new Date().getTime();
                const target = new Date(currentEvent.targetDate).getTime();

                // Если время ивента пришло и подписка активна
                if (now >= target && localStorage.getItem(`notify_${eventId}`) === 'true') {
                    new Notification("Ивент начался!", {
                        body: `Событие "${currentEvent.name}" запущено! Заходи на сайт.`,
                        icon: "image_1783243002378.jpeg"
                    });
                    localStorage.removeItem(`notify_${eventId}`); // Сбрасываем подписку
                    renderEvents(); // Перерисовываем кнопку
                    clearInterval(checkInterval);
                }
            }, 5000); // Проверка каждые 5 сек (пока вкладка открыта)
        }

        renderEvents();
    </script>
</body>
</html>
